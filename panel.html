<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Asistencia — Casa Velasco</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f4ef;
    --surface: #ffffff;
    --border: #e4e1d8;
    --dark: #14141c;
    --accent: #f5c518;
    --accent2: #ff6b35;
    --text: #1e1e28;
    --muted: #898998;
    --success: #15803d;
    --danger: #b91c1c;
    --success-bg: #f0fdf4;
    --danger-bg: #fef2f2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--dark);
    height: 60px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }

  .hdr-left { display: flex; align-items: center; gap: 12px; }

  .logo-box {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
    color: #000; transform: rotate(-3deg);
  }

  .hdr-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 800; color: #fff;
  }

  .hdr-left span {
    font-size: 10px; color: #5a5a6e;
    letter-spacing: 1px; text-transform: uppercase;
  }

  .hdr-right { display: flex; align-items: center; gap: 10px; }

  .btn-sm {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid #242436;
    background: transparent;
    color: #888;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Main ── */
  main { padding: 28px; max-width: 1100px; margin: 0 auto; }

  /* Filtros */
  .filters {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    margin-bottom: 24px;
  }

  .filters label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); display: block; margin-bottom: 4px;
  }

  .filter-group { display: flex; flex-direction: column; }

  .filters input[type="date"],
  .filters select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 9px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none; cursor: pointer;
    transition: border-color 0.2s;
    min-width: 140px;
  }
  .filters input[type="date"]:focus,
  .filters select:focus { border-color: var(--accent); }

  .filter-actions { display: flex; gap: 10px; margin-left: auto; align-items: flex-end; }

  .btn-cargar {
    background: var(--dark); color: #fff;
    border: none; padding: 9px 18px;
    border-radius: 9px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
    cursor: pointer; transition: background 0.2s;
    height: 38px;
  }
  .btn-cargar:hover { background: #24243a; }

  .btn-export {
    background: var(--accent); color: #000;
    border: none; padding: 9px 18px;
    border-radius: 9px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
    height: 38px;
  }
  .btn-export:hover { box-shadow: 0 4px 18px rgba(245,197,24,0.4); }

  /* KPIs */
  .kpis {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    position: relative; overflow: hidden;
  }

  .kpi-bar {
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent);
  }
  .kpi.v .kpi-bar { background: var(--success); }
  .kpi.r .kpi-bar { background: var(--danger);  }
  .kpi.o .kpi-bar { background: var(--accent2); }

  .kpi .val {
    font-family: 'Syne', sans-serif;
    font-size: 34px; font-weight: 800;
    color: var(--dark); line-height: 1;
  }

  .kpi .lbl {
    font-size: 11px; color: var(--muted);
    margin-top: 5px; text-transform: uppercase; letter-spacing: 0.8px;
  }

  /* Resumen empleados */
  .section-hdr {
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 800;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px;
  }

  .emp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .emp-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 13px;
    padding: 14px 16px;
  }

  .emp-card .nombre {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }

  .emp-card .stat {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); padding: 2px 0;
  }
  .emp-card .stat b { color: var(--text); font-weight: 600; }

  /* Tabla */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }

  .table-hdr {
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .table-hdr h2 {
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
  }

  .pill {
    font-size: 11px; color: var(--muted);
    background: var(--bg); padding: 3px 10px;
    border-radius: 20px; font-weight: 500;
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left; padding: 10px 22px;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted);
    background: #f9f8f4;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 13px 22px; font-size: 13px;
    border-bottom: 1px solid #f0ede5;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf6; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 3px 9px; border-radius: 20px;
  }
  .badge.entrada { background: var(--success-bg); color: var(--success); }
  .badge.salida  { background: var(--danger-bg);  color: var(--danger);  }
  .badge.express { background: #eff6ff; color: #1d4ed8; }
  .badge.reforma { background: #fdf4ff; color: #7e22ce; }

  .empty {
    text-align: center; padding: 56px 24px; color: var(--muted);
  }
  .empty .ico { font-size: 40px; margin-bottom: 10px; }
  .empty p { font-size: 13px; }

  /* Config modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 24px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 28px;
    width: 100%; max-width: 460px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  }

  .modal h3 {
    font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800;
    margin-bottom: 18px;
  }

  .modal label {
    display: block; font-size: 10px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 7px;
  }

  .modal input {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--bg); color: var(--text);
    padding: 11px 13px; border-radius: 9px;
    font-size: 12px; font-family: monospace;
    margin-bottom: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .modal input:focus { border-color: var(--accent); }

  .modal-btns { display: flex; gap: 10px; }

  .btn-save {
    flex: 1; padding: 11px;
    border-radius: 9px; border: none;
    background: var(--dark); color: #fff;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
    cursor: pointer;
  }

  .btn-cancel {
    padding: 11px 18px; border-radius: 9px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
    cursor: pointer;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid #ddd; border-top-color: var(--dark);
    border-radius: 50%; display: inline-block;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 680px) {
    main { padding: 18px 14px; }
    header { padding: 0 16px; }
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .filter-actions { margin-left: 0; width: 100%; }
    th:nth-child(3), td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <div class="logo-box">CV</div>
    <div>
      <h1>Casa Velasco</h1>
      <span>Panel de Asistencia</span>
    </div>
  </div>
  <div class="hdr-right">
    <a href="index.html" style="color:#555;font-size:13px;text-decoration:none">← Inicio</a>
    <button class="btn-sm" onclick="abrirConfig()">⚙️ Configurar</button>
  </div>
</header>

<main>

  <!-- Filtros -->
  <div class="filters">
    <div class="filter-group">
      <label>Desde</label>
      <input type="date" id="fechaDesde">
    </div>
    <div class="filter-group">
      <label>Hasta</label>
      <input type="date" id="fechaHasta">
    </div>
    <div class="filter-group">
      <label>Empleado</label>
      <select id="filtroEmpleado">
        <option value="">Todos</option>
        <option>Ruth</option><option>Mary</option>
        <option>Itazabi</option><option>Coral</option><option>Aide</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Sucursal</label>
      <select id="filtroSucursal">
        <option value="">Ambas</option>
        <option value="Express">Express</option>
        <option value="Reforma">Reforma</option>
      </select>
    </div>
    <div class="filter-actions">
      <button class="btn-cargar" onclick="cargarDatos()">🔄 Cargar</button>
      <button class="btn-export" onclick="exportarCSV()">↓ CSV</button>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-bar"></div>
      <div class="val" id="kpiTotal">—</div>
      <div class="lbl">Registros</div>
    </div>
    <div class="kpi v">
      <div class="kpi-bar"></div>
      <div class="val" id="kpiEntradas">—</div>
      <div class="lbl">Entradas</div>
    </div>
    <div class="kpi r">
      <div class="kpi-bar"></div>
      <div class="val" id="kpiSalidas">—</div>
      <div class="lbl">Salidas</div>
    </div>
    <div class="kpi o">
      <div class="kpi-bar"></div>
      <div class="val" id="kpiDias">—</div>
      <div class="lbl">Días con registro</div>
    </div>
  </div>

  <!-- Resumen por empleado -->
  <div class="section-hdr">Resumen por empleado</div>
  <div class="emp-grid" id="empGrid"></div>

  <!-- Tabla -->
  <div class="table-wrap">
    <div class="table-hdr">
      <h2>Detalle de registros</h2>
      <span class="pill" id="countPill">—</span>
    </div>
    <div id="tableArea">
      <div class="empty">
        <div class="ico">📋</div>
        <p>Configura la URL del script y presiona "Cargar"</p>
      </div>
    </div>
  </div>

</main>

<!-- Modal config -->
<div class="overlay" id="configOverlay" onclick="cerrarOverlay(event)">
  <div class="modal">
    <h3>⚙️ Configuración</h3>
    <label>URL del Google Apps Script</label>
    <input type="url" id="urlPanel" placeholder="https://script.google.com/macros/s/.../exec">
    <p style="font-size:12px;color:var(--muted);margin:-8px 0 16px">La misma URL que usas en el checador.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('configOverlay').classList.remove('open')">Cancelar</button>
      <button class="btn-save" onclick="guardarConfig()">Guardar</button>
    </div>
  </div>
</div>

<script>
  let registros = [];

  // Fechas default: hoy
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('fechaDesde').value = hoy;
  document.getElementById('fechaHasta').value = hoy;

  // Config
  function abrirConfig() {
    document.getElementById('urlPanel').value = localStorage.getItem('cv_panel_url') || '';
    document.getElementById('configOverlay').classList.add('open');
  }

  function guardarConfig() {
    localStorage.setItem('cv_panel_url', document.getElementById('urlPanel').value.trim());
    document.getElementById('configOverlay').classList.remove('open');
  }

  function cerrarOverlay(e) {
    if (e.target === document.getElementById('configOverlay'))
      document.getElementById('configOverlay').classList.remove('open');
  }

  window.addEventListener('load', () => {
    if (localStorage.getItem('cv_panel_url')) cargarDatos();
  });

  // Cargar
  async function cargarDatos() {
    const url = localStorage.getItem('cv_panel_url');
    if (!url) { abrirConfig(); return; }

    document.getElementById('tableArea').innerHTML =
      '<div class="empty"><span class="spinner"></span> Cargando registros…</div>';

    const params = new URLSearchParams({
      accion:    'getChecadas',
      desde:     document.getElementById('fechaDesde').value,
      hasta:     document.getElementById('fechaHasta').value,
      empleado:  document.getElementById('filtroEmpleado').value,
      sucursal:  document.getElementById('filtroSucursal').value
    });

    try {
      const res  = await fetch(`${url}?${params}`);
      const data = await res.json();
      registros  = data.registros || [];
      renderTodo(registros);
    } catch {
      document.getElementById('tableArea').innerHTML =
        '<div class="empty"><div class="ico">⚠️</div><p>Error al conectar. Verifica la URL del script.</p></div>';
    }
  }

  function renderTodo(data) {
    // KPIs
    const ent  = data.filter(r => r.tipo === 'entrada').length;
    const sal  = data.filter(r => r.tipo === 'salida').length;
    const dias = new Set(data.map(r => r.fecha)).size;
    document.getElementById('kpiTotal').textContent    = data.length;
    document.getElementById('kpiEntradas').textContent = ent;
    document.getElementById('kpiSalidas').textContent  = sal;
    document.getElementById('kpiDias').textContent     = dias;
    document.getElementById('countPill').textContent   = `${data.length} registros`;

    // Resumen empleados
    const empGrid = document.getElementById('empGrid');
    empGrid.innerHTML = '';
    ['Ruth','Mary','Itazabi','Coral','Aide'].forEach(emp => {
      const regs = data.filter(r => r.empleado === emp);
      if (!regs.length) return;
      empGrid.innerHTML += `
        <div class="emp-card">
          <div class="nombre">👤 ${emp}</div>
          <div class="stat"><span>Entradas</span><b>${regs.filter(r=>r.tipo==='entrada').length}</b></div>
          <div class="stat"><span>Salidas</span><b>${regs.filter(r=>r.tipo==='salida').length}</b></div>
          <div class="stat"><span>Días</span><b>${new Set(regs.map(r=>r.fecha)).size}</b></div>
        </div>`;
    });

    if (!data.length) {
      document.getElementById('tableArea').innerHTML =
        '<div class="empty"><div class="ico">🔍</div><p>Sin registros para el período seleccionado</p></div>';
      return;
    }

    const sorted = [...data].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

    let html = `<table><thead><tr>
      <th>Empleado</th><th>Tipo</th><th>Sucursal</th><th>Fecha</th><th>Hora</th>
    </tr></thead><tbody>`;

    sorted.forEach(r => {
      const tB = r.tipo === 'entrada'
        ? `<span class="badge entrada">🟢 Entrada</span>`
        : `<span class="badge salida">🔴 Salida</span>`;
      const sB = r.sucursal === 'Express'
        ? `<span class="badge express">Express</span>`
        : `<span class="badge reforma">Reforma</span>`;
      html += `<tr>
        <td><strong>${r.empleado}</strong></td>
        <td>${tB}</td>
        <td>${sB}</td>
        <td>${r.fecha}</td>
        <td>${r.hora}</td>
      </tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById('tableArea').innerHTML = html;
  }

  function exportarCSV() {
    if (!registros.length) { alert('No hay datos para exportar.'); return; }
    const csv = [
      ['Empleado','Tipo','Sucursal','Fecha','Hora','Timestamp'],
      ...registros.map(r => [r.empleado, r.tipo, r.sucursal, r.fecha, r.hora, r.timestamp])
    ].map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    a.download = `asistencia_cv_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  }
</script>
</body>
</html>
